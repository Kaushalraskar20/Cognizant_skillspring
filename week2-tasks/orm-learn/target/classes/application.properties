# ============================================================
# Spring Framework and application log levels
# ============================================================
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logging - shows every SQL query Hibernate generates
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern matching the handson doc specification
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ============================================================
# H2 In-Memory Database (DEFAULT - runs without any install)
# ============================================================
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create: drops and recreates all tables on each startup (fine for H2 dev/demo)
# validate: use this with MySQL once the table already exists (matches handson doc)
spring.jpa.hibernate.ddl-auto=create

# Show H2 console at http://localhost:8080/h2-console (username: sa, no password)
spring.h2.console.enabled=true

