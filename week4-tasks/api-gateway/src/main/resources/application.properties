server.port=9090
spring.application.name=api-gateway

# Register gateway itself with Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Auto-discover routes from Eureka:
# http://localhost:9090/account-service/accounts/123  →  account service
# http://localhost:9090/loan-service/loans/456         →  loan service
spring.cloud.gateway.discovery.locator.enabled=true

# Use lower-case service IDs in URLs (account-service not ACCOUNT-SERVICE)
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Expose gateway routes endpoint for debugging
management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=gateway,health,info

logging.level.com.cognizant=debug
logging.level.org.springframework.cloud.gateway=info
